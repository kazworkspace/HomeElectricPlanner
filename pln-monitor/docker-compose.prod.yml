services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: pln-monitor
    ports:
      - "0.0.0.0:3001:3001"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_DIR=/app/data
    restart: unless-stopped
